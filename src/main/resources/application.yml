spring:
  application:
    name: notification-service

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: notification-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.type.mapping: event:com.mipt.notification.event.AdvertisementEvent
        spring.json.value.default.type: com.mipt.notification.event.AdvertisementEvent
      auto-offset-reset: earliest
      enable-auto-commit: false
    listener:
      ack-mode: manual

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

server:
  port: 8082

logging:
  level:
    com.mipt.notification: DEBUG
    org.springframework.kafka: DEBUG
    org.springframework.mail: DEBUG

kafka:
  topic:
    advertisement-events: advertisement-events

telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN:your-bot-token}
    username: ${TELEGRAM_BOT_USERNAME:your-bot-username}